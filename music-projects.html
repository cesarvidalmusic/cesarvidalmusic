<body>

<script>
// Fix for hover color flickering:
// use mouseenter/mouseleave instead of mouseover/mouseout.
const HOVER_COLORS = ["#242017","#2c5544","#ed6551","#efd06f","#f8efdd"];

document.querySelectorAll(".cv-mp-card").forEach(card => {
  card.addEventListener("mouseenter", () => {
    const color = HOVER_COLORS[Math.floor(Math.random()*HOVER_COLORS.length)];
    card.style.setProperty("--hover-color", color);
    const title = card.querySelector(".cv-mp-card-title");
    if (color === "#242017" || color === "#2c5544") title.style.color="#fff";
    else title.style.color="#0A0A0A";
  });
  card.addEventListener("mouseleave", () => {
    card.style.removeProperty("--hover-color");
    const title = card.querySelector(".cv-mp-card-title");
    if (title) title.style.color="";
  });
});
</script>
</body>
</html>
