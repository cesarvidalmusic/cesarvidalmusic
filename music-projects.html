<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Music & Projects — César Vidal." />
  <title>Music & Projects — César Vidal</title>
  <link rel="preload" href="fonts/Ronzino-BoldOblique.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="fonts/Ronzino-Regular.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    html, body { height: 100%; overflow: hidden; }

    .cv-page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .cv-page-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding-top: 0;
    }

    /* COLUMNS AREA */
    .cv-mp-stage {
      flex: 1;
      min-height: 0;
      padding: 0 var(--pad-x);
      display: flex;
      gap: 0;
      overflow: hidden;
    }

    .cv-mp-col {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-left: 0.5px solid #E0E0E0;
    }
    .cv-mp-col:last-child { border-right: 0.5px solid #E0E0E0; }

    .cv-mp-track {
      position: absolute;
      left: 0; right: 0;
      will-change: transform;
    }

    /* CARD */
    .cv-mp-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 1rem 1rem;
      border-bottom: 0.5px solid #E0E0E0;
      height: 75vh;
      box-sizing: border-box;
      text-decoration: none;
      color: #0A0A0A;
      gap: 0.75rem;
      /* transition for both scale and background */
      transition: background 0.35s ease, transform 0.35s ease;
      transform-origin: center center;
      position: relative;
      z-index: 1;
    }
    /* HOVER: scale up + color change */
    .cv-mp-card {
     transition: background 0.35s ease, transform 0.35s ease;
    }

    .cv-mp-card:hover {
    background: var(--hover-color);
    transform: scale(1.03);
    z-index: 2;
    }

.cv-mp-card-title {
  transition: color 0.35s ease;
}

    .cv-mp-cover {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      object-position: center;
      display: block;
      flex-shrink: 0;
    }

    .cv-mp-card-title {
      font-family: 'Ronzino', sans-serif;
      font-weight: 400;
      font-size: clamp(12px, 1.2vw, 17px);
      line-height: 1.25;
      letter-spacing: 0.01em;
      color: #0A0A0A;
    }
    .cv-mp-card-title em { font-style: italic; }

    /* FOOTER */
    .cv-mp-footer {
      flex-shrink: 0;
      padding: 0.65rem var(--pad-x);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 0.5px solid #E0E0E0;
    }
    .cv-mp-footer span {
      font-family: 'Ronzino', sans-serif;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      color: #bbb;
    }
    /* Move title bar down without changing the whole page */
.cv-page-hero {
  padding-top: calc(var(--nav-height) + 0.75rem);
  flex-shrink: 0;
}

/* Keep page fixed and reduce only the project area */
.cv-mp-stage {
  height: calc(100vh - (var(--nav-height) * 2) - 52px);
  flex: none;
}
  </style>
</head>
<body>
<div class="cv-page">

  <nav class="cv-nav cv-nav--light">
    <ul>
      <li><a href="index.html">home</a></li>
      <li><a href="bio.html">bio</a></li>
      <li><a href="music-projects.html" class="active">music &amp; projects</a></li>
      <li><a href="https://syos.co/en/blogs/our-artists/cesar-vidal" target="_blank" rel="noopener">syos artist</a></li>
      <li><a href="gonzalez-reeds.html">gonzalez reeds</a></li>
      <li><a href="merch.html">merch</a></li>
      <li><a href="contact.html">contact</a></li>
    </ul>
  </nav>

  <main class="cv-page-content">

    <!-- Title uses global cv-page-hero — same as contact/gonzalez-reeds -->
    <div class="cv-page-hero">
      <h1 class="cv-page-title">music & projects</h1>
    </div>

    <div class="cv-mp-stage" id="stage">

       <!-- COL 1: UP — speed 22px/s -->
       <div class="cv-mp-col">

       <div class="cv-mp-track" id="track0"></div>

       </div>

       <!-- COL 2: DOWN — speed 30px/s -->
       <div class="cv-mp-col">

       <div class="cv-mp-track" id="track1"></div>

       </div>

       <!-- COL 3: UP — speed 18px/s -->
       <div class="cv-mp-col">

       <div class="cv-mp-track" id="track2"></div>

       </div>
      
       <!-- COL 4: DOWN — speed 26px/s -->
       <div class="cv-mp-col">

       <div class="cv-mp-track" id="track3"></div>

       </div>
      
    </div>
  </main>

  <footer class="cv-mp-footer">
    <span>© 2026 César Vidal</span>
    <span>cesarvidalmusic.art</span>
  </footer>

</div>

<script>
  // Each column has its own speed (px/s), slightly different
  const SPEEDS = [18,22,26,30];

const DIRS = [1,-1,1,-1];


const trackEls = [
document.getElementById("track0"),
document.getElementById("track1"),
document.getElementById("track2"),
document.getElementById("track3")
];



const PROJECTS = [


{
title:"Des Visages",
image:"img/cover-des-visages.jpg",
link:"des-visages.html"
},


{
title:"NUBES",
image:"img/cover-nubes.jpg",
link:"nubes.html",
italic:true
},


{
title:"SPAM",
image:"img/cover-spam.jpg",
link:"spam.html",
italic:true
},


{
title:"César Vidal & Artikulation Band",
image:"img/cover-artikulation-band.jpg",
link:"artikulation-band.html"
},


{
title:"Solo Project",
image:"img/cover-solo-project.jpg",
link:"solo-project.html"
},


{
title:"Des Visages (EP)",
image:"img/cover-des-visages-ep.jpg",
link:"des-visages-ep.html",
italic:true
},


{
title:"aleas",
image:"img/cover-aleas.jpg",
link:"aleas.html",
italic:true
},


{
title:"Flor de Loto",
image:"img/cover-flor-de-loto.jpg",
link:"flor-de-loto.html",
italic:true
}


];





function createCard(project){


const card=document.createElement("a");


card.className="cv-mp-card";


card.href=project.link;



card.innerHTML = `

<img class="cv-mp-cover" src="${project.image}">


<span class="cv-mp-card-title">

${project.italic ? "<em>"+project.title+"</em>" : project.title}

</span>

`;



addHover(card);



return card;


}







function getVisibleProjects(){


let visible=[];


document.querySelectorAll(".cv-mp-card")
.forEach(card=>{


const rect=card.getBoundingClientRect();



if(
rect.top < window.innerHeight &&
rect.bottom > 0
){


visible.push(card.dataset.project);


}



});


return visible;


}






function randomProject(){


const visible=getVisibleProjects();



let available =
PROJECTS.filter(
p=>!visible.includes(p.title)
);



return available[
Math.floor(Math.random()*available.length)
];


}







function fillInitial(){


trackEls.forEach((track,i)=>{


for(let j=0;j<3;j++){


const card=createCard(
randomProject()
);


card.dataset.project =
card.querySelector(".cv-mp-card-title").innerText;



track.appendChild(card);


}


});


}







const positions=[0,0,0,0];



function animate(ts){


if(!animate.last)
animate.last=ts;


const dt =
(ts-animate.last)/1000;


animate.last=ts;



trackEls.forEach((track,i)=>{



positions[i]+=SPEEDS[i]*dt*DIRS[i];



track.style.transform =
`translateY(${positions[i]}px)`;





const cards =
Array.from(track.children);



cards.forEach(card=>{


const rect =
card.getBoundingClientRect();



if(
rect.bottom < -50 ||
rect.top > window.innerHeight + 50
){


track.removeChild(card);



const newCard =
createCard(randomProject());


newCard.dataset.project =
newCard.querySelector(".cv-mp-card-title").innerText;



if(DIRS[i]===1){

track.appendChild(newCard);

}
else{

track.insertBefore(
newCard,
track.firstChild
);


}


}



});



});



requestAnimationFrame(animate);


}


const HOVER_COLORS = [
"#242017",
"#2c5544",
"#ed6551",
"#efd06f",
"#f8efdd"
];



function addHover(card){


card.addEventListener("mouseenter",()=>{


const color =
HOVER_COLORS[
Math.floor(Math.random()*HOVER_COLORS.length)
];



card.style.setProperty(
"--hover-color",
color
);



const title =
card.querySelector(".cv-mp-card-title");



if(
color === "#242017" ||
color === "#2c5544"
){

title.style.color="#ffffff";


}else{


title.style.color="#0A0A0A";


}


});




card.addEventListener("mouseleave",()=>{


card.style.removeProperty("--hover-color");


card.querySelector(".cv-mp-card-title").style.color="";


});



fillInitial();


requestAnimationFrame(animate);
const HOVER_COLORS = [
  "#242017",
  "#2c5544",
  "#ed6551",
  "#efd06f",
  "#f8efdd"
];

</script>

</body>
</html>
