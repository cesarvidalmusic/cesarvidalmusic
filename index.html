<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="César Vidal — Saxophonist, Composer and Improviser based in Amsterdam." />
  <title>César Vidal</title>
  <link rel="preload" href="fonts/Ronzino-BoldOblique.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="fonts/Ronzino-Regular.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    html, body { height: 100%; overflow: hidden; }

    .cv-home-wrap {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .cv-hero {
      position: relative;
      flex: 1;
      overflow: hidden;
      background: #0d0d0d;
      min-height: 0;
    }

    /* PHOTO */
    .cv-hero-img-wrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }
    .cv-hero-img {
      position: absolute;
      inset: -6px;
      width: calc(100% + 12px);
      height: calc(100% + 12px);
      object-fit: cover;
      object-position: 35% center;
      display: block;
      animation: heroBlur 50s ease-in-out infinite;
      will-change: filter;
    }
    @keyframes heroBlur {
      0%   { filter: blur(0px) brightness(1); }
      50%  { filter: blur(9px) brightness(0.88); }
      100% { filter: blur(0px) brightness(1); }
    }

    /* OVERLAY */
    .cv-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.08) 40%,
        rgba(0,0,0,0.0) 65%,
        rgba(0,0,0,0.18) 100%
      );
      z-index: 1;
    }

    /* CONTENT — right aligned with moderate padding */
    .cv-hero-content {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: clamp(0.85rem, 2.5vw, 1.5rem) clamp(2rem, 4vw, 3.5rem);
    }

    /* NAV — right aligned */
    .cv-hero-nav {
      display: flex;
      justify-content: flex-end;
      flex-shrink: 0;
    }
    .cv-hero-nav ul {
      display: flex;
      gap: clamp(1.5rem, 2.8vw, 2.5rem);
      list-style: none;
    }
    .cv-hero-nav a {
      font-family: 'Ronzino', sans-serif;
      font-weight: 400;
      font-size: clamp(12px, 1.1vw, 15px);
      letter-spacing: 0.03em;
      text-transform: lowercase;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      transition: color 0.2s;
    }
    .cv-hero-nav a:hover { color: #fff; }

    /* TITLE — right aligned, end of "vidal" lines up with end of "contact" */
    .cv-hero-name {
      font-family: 'Ronzino', serif;
      font-weight: 700;
      font-style: oblique;
      font-size: clamp(36px, 7.5vw, 86px);
      line-height: 1;
      color: #fff;
      text-transform: lowercase;
      letter-spacing: -0.06em;
      text-align: right;
      margin-top: clamp(1.2rem, 2.5vw, 2rem);
      flex-shrink: 0;
    }

    /* spacer pushes tagline to bottom */
    .cv-hero-spacer { flex: 1; }

    .cv-hero-bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding-bottom: 0.25rem;
      flex-shrink: 0;
    }
    .cv-hero-tagline {
      font-family: 'Ronzino', sans-serif;
      font-size: clamp(9px, 0.9vw, 11px);
      letter-spacing: 0.16em;
      text-transform: lowercase;
      color: rgba(255,255,255,0.45);
    }
    .cv-dot {
      display: inline-block;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #C8400A;
      margin: 0 0.4em;
      vertical-align: middle;
    }

    /* FOOTER */
    .cv-home-footer {
      flex-shrink: 0;
      padding: 0.65rem clamp(0.5rem, 2vw, 1.25rem);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 0.5px solid #E0E0E0;
      background: #fff;
    }
    .cv-home-footer span {
      font-family: 'Ronzino', sans-serif;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      color: #bbb;
    }
  </style>
</head>
<body>

  <div class="cv-home-wrap">

    <section class="cv-hero">
      <div class="cv-hero-img-wrap">
        <img
          class="cv-hero-img"
          src="img/hero.jpg"
          alt="César Vidal — photo by Orlando Pedroso"
        />
      </div>
      <div class="cv-hero-overlay"></div>

      <div class="cv-hero-content">
        <div class="cv-hero-nav">
          <ul>
            <li><a href="bio.html">bio</a></li>
            <li><a href="music-projects.html">music & projects</a></li>
            <li><a href="https://syos.co/en/blogs/our-artists/cesar-vidal" target="_blank" rel="noopener">syos artist</a></li>
            <li><a href="gonzalez-reeds.html">gonzalez reeds</a></li>
            <li><a href="contact.html">contact</a></li>
          </ul>
        </div>

        <div class="cv-hero-name">césar vidal</div>

        <div class="cv-hero-spacer"></div>

        <div class="cv-hero-bottom">
          <span class="cv-hero-tagline">
            saxophonist<span class="cv-dot"></span>composer<span class="cv-dot"></span>improviser
          </span>
          <span class="cv-hero-tagline">photo by Orlando Pedroso</span>
        </div>
      </div>
    </section>

    <footer class="cv-home-footer">
      <span>© 2026 César Vidal</span>
      <span>cesarvidalmusic.art</span>
    </footer>

  </div>

</body>
</html>
