<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Bio — César Vidal, saxophonist, composer and improviser." />
  <title>Bio — César Vidal</title>
  <link rel="preload" href="fonts/Ronzino-BoldOblique.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="fonts/Ronzino-Regular.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    html, body { height: 100%; overflow: hidden; }

    .cv-page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .cv-page-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding-top: 0;
    }

    .cv-page-hero {
      padding: 0.5rem clamp(1.25rem, 4vw, 2.5rem);
      border-bottom: 0.5px solid #E0E0E0;
      flex-shrink: 0;
    }

    .cv-bio-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 55fr 45fr;
      min-height: 0;
      overflow: hidden;
    }

    /* Text column: clips overflow so scrollbar never shows */
    .cv-bio-text {
      position: relative;
      border-right: 0.5px solid #E0E0E0;
      overflow: hidden;
    }

    /* The scrolling track — positioned absolutely so we control it fully */
    .cv-bio-track {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      will-change: transform;
    }

    /* Each unit = one block + one separator. We pad inside the block. */
    .cv-bio-unit {
      padding: clamp(1rem, 2vw, 1.5rem) clamp(1.25rem, 4vw, 2.5rem);
    }

    .cv-bio-unit p {
      font-family: 'Ronzino', sans-serif;
      font-weight: 400;
      font-size: clamp(10.5px, 0.95vw, 13px);
      line-height: 1.78;
      color: #333;
      text-align: justify;
      hyphens: auto;
      margin-bottom: 0.85rem;
    }
    .cv-bio-unit p:last-child { margin-bottom: 0; }

    .cv-bio-sep {
      text-align: center;
      font-family: 'Ronzino', sans-serif;
      font-size: 11px;
      color: #ccc;
      letter-spacing: 0.1em;
      padding: 1rem clamp(1.25rem, 4vw, 2.5rem);
      user-select: none;
    }

    .cv-bio-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .cv-bio-footer {
      flex-shrink: 0;
      padding: 0.55rem clamp(0.5rem, 2vw, 1.25rem);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 0.5px solid #E0E0E0;
    }
    .cv-bio-footer span {
      font-family: 'Ronzino', sans-serif;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      color: #bbb;
    }
  </style>
</head>
<body>

  <div class="cv-page">

    <nav class="cv-nav cv-nav--light">
      <ul>
        <li><a href="index.html">home</a></li>
        <li><a href="bio.html">bio</a></li>
        <li><a href="music-projects.html">music &amp; projects</a></li>
        <li><a href="https://syos.co/en/blogs/our-artists/cesar-vidal" target="_blank" rel="noopener">syos artist</a></li>
        <li><a href="gonzalez-reeds.html">gonzalez reeds</a></li>
        <li><a href="merch.html">merch</a></li>
        <li><a href="contact.html">contact</a></li>
      </ul>
    </nav>

    <main class="cv-page-content">

      <div class="cv-page-hero">
        <h1 class="cv-page-title">bio</h1>
      </div>

      <div class="cv-bio-grid">

        <div class="cv-bio-text" id="bioWrap">
          <div class="cv-bio-track" id="bioTrack">
            <!-- Units injected by JS so loop is always clean -->
          </div>
        </div>

        <div style="position:relative; overflow:hidden;">
          <img
            class="cv-bio-photo"
            src="img/bio-photo.JPG"
            alt="César Vidal — photo by Orlando Pedroso"
          />
          <span style="
            position:absolute;
            bottom: clamp(0.5rem, 1.5vw, 1rem);
            right: clamp(0.75rem, 2vw, 1.25rem);
            font-family:'Ronzino',sans-serif;
            font-size: clamp(9px, 0.9vw, 11px);
            letter-spacing: 0.16em;
            color: rgba(255,255,255,0.45);
          ">photo by Orlando Pedroso</span>
        </div>

      </div>

    </main>

    <footer class="cv-bio-footer">
      <span>© 2026 César Vidal</span>
      <span>cesarvidalmusic.art</span>
    </footer>

  </div>

  <script>
    const BIO_TEXT = `
      <p>César Vidal is a Chilean saxophonist, composer, and improviser based in Amsterdam. His artistic practice explores the relationship between acoustic and electronic sound, with a particular interest in the hybrid space created between the saxophone and digital processes. Through improvisation, he investigates how sound sources of different natures can develop a shared language, bringing together acoustic and electronic elements into a common sonic environment.</p>
      <p>He studied classical composition at the University of Chile, working with renowned Chilean and international composers, before completing a Master's degree in Jazz Saxophone at the Conservatorium van Amsterdam, where he studied with leading Dutch musicians such as Ben van Gelder and Simon Rigter.</p>
      <p>Throughout his career, Vidal has collaborated with musicians from the Chilean and international scenes, participating in acclaimed recordings such as <em>Chincol</em> (2021) by Juan Pablo Salvo and <em>CODEX Big Band</em> (2022) by Alfredo Tauber, both recipients of the Pulsar Award for Best Jazz Artist, the most important music recognition in the Chilean music industry. He has also contributed as a sideman to numerous jazz recordings and developed a diverse discography of his own, including <em>SPAM</em> (2026), <em>NUBES</em> (2025), and <em>aleas</em> (2026).</p>
      <p>Vidal has performed at festivals and venues across Chile and Europe, including BIMHUIS (Amsterdam), JazzBer and Getxo Jazz (Basque Country), La Fête de la Musique (Geneva), and Jazzahead (Bremen). He leads and co-leads several projects, including César Vidal &amp; Artikulation Band, a contemporary jazz ensemble with electronics that won second prize at the Getxo Jazz Ensemble Competition 2025 and opened for Grammy Award-winning vocalist Cécile McLorin Salvant.</p>
      <p>He is also the co-founder of Des Visages, a saxophone and electronics duo focused on improvisation and sound exploration. The project has released two recordings and has toured across Europe, performing in cities such as London, Amsterdam, Copenhagen, Paris, Bern, Marseille, and Geneva.</p>
    `;

    const SEP_HTML = `<div class="cv-bio-sep">— — — — — — — — — — —</div>`;

    function makeUnit() {
      const unit = document.createElement('div');
      unit.className = 'cv-bio-unit';
      unit.innerHTML = BIO_TEXT;
      return unit;
    }

    const track = document.getElementById('bioTrack');

    // Build: unit A + sep + unit B + sep
    // We scroll through unit A + sep (= loopHeight), then silently reset.
    // Unit B ensures content is always visible during the reset.
    const unitA = makeUnit();
    const sep1  = document.createElement('div');
    sep1.innerHTML = SEP_HTML;

    const unitB = makeUnit();
    const sep2  = document.createElement('div');
    sep2.innerHTML = SEP_HTML;

    track.appendChild(unitA);
    track.appendChild(sep1);
    track.appendChild(unitB);
    track.appendChild(sep2);

    // Speed: px per second. Lower = slower.
    const SPEED = 10;

    let pos = 0;
    let loopHeight = 0;
    let lastTime = null;

    function measure() {
      // loopHeight = height of exactly one unit + one separator
      loopHeight = unitA.offsetHeight + sep1.firstElementChild.offsetHeight;
    }

    function tick(ts) {
      if (!lastTime) lastTime = ts;
      const dt = (ts - lastTime) / 1000;
      lastTime = ts;

      pos += SPEED * dt;

      // Silent reset: when we've scrolled exactly one loop unit,
      // snap back — visually seamless because unitB looks identical to unitA
      if (pos >= loopHeight) {
        pos -= loopHeight;
      }

      track.style.transform = `translateY(${-pos}px)`;
      requestAnimationFrame(tick);
    }

    // 3 second pause before scroll begins, then measure and start
    setTimeout(() => {
      measure();
      requestAnimationFrame(tick);
    }, 3200);
  </script>

</body>
</html>
